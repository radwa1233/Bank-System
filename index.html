<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOVA BANK - Login</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="bankSystem.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

  <!-- ===== INTRO ANIMATION OVERLAY ===== -->
  <div class="intro-overlay" id="introOverlay">
    <div class="intro-star">
      <svg viewBox="0 0 100 100" class="nb-star">
        <defs>
          <linearGradient id="introLight" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#F6E7A6" /><stop offset="100%" stop-color="#D4AF37" />
          </linearGradient>
          <linearGradient id="introDark" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#B8941F" /><stop offset="100%" stop-color="#8A6A12" />
          </linearGradient>
        </defs>
        <!-- UP -->
        <polygon class="f-l" fill="url(#introLight)" points="50,50 44.6,37.1 50,2"/>
        <polygon class="f-d" fill="url(#introDark)"  points="50,50 50,2 55.4,37.1"/>
        <!-- NE -->
        <polygon class="f-l" fill="url(#introLight)" points="50,50 55.4,37.1 73.3,26.7"/>
        <polygon class="f-d" fill="url(#introDark)"  points="50,50 73.3,26.7 62.9,44.6"/>
        <!-- RIGHT -->
        <polygon class="f-l" fill="url(#introLight)" points="50,50 62.9,44.6 98,50"/>
        <polygon class="f-d" fill="url(#introDark)"  points="50,50 98,50 62.9,55.4"/>
        <!-- SE -->
        <polygon class="f-l" fill="url(#introLight)" points="50,50 62.9,55.4 73.3,73.3"/>
        <polygon class="f-d" fill="url(#introDark)"  points="50,50 73.3,73.3 55.4,62.9"/>
        <!-- DOWN -->
        <polygon class="f-l" fill="url(#introLight)" points="50,50 55.4,62.9 50,98"/>
        <polygon class="f-d" fill="url(#introDark)"  points="50,50 50,98 44.6,62.9"/>
        <!-- SW -->
        <polygon class="f-l" fill="url(#introLight)" points="50,50 44.6,62.9 26.7,73.3"/>
        <polygon class="f-d" fill="url(#introDark)"  points="50,50 26.7,73.3 37.1,55.4"/>
        <!-- LEFT -->
        <polygon class="f-l" fill="url(#introLight)" points="50,50 37.1,55.4 2,50"/>
        <polygon class="f-d" fill="url(#introDark)"  points="50,50 2,50 37.1,44.6"/>
        <!-- NW -->
        <polygon class="f-l" fill="url(#introLight)" points="50,50 37.1,44.6 26.7,26.7"/>
        <polygon class="f-d" fill="url(#introDark)"  points="50,50 26.7,26.7 44.6,37.1"/>
      </svg>
    </div>
    <div class="intro-tagline">NOVA BANK</div>
  </div>

  <!-- ===== LOGIN PAGE ===== -->
  <div class="login-page">

    <div class="login-visual">
      <div class="login-visual-logo">
        <div class="brand-logo-card">
          <span class="logo-star-glow"></span>
          <img src="logo.png" alt="NOVA BANK">
        </div>
      </div>

      <div class="login-stats">
        <div class="login-stat">
          <div class="stat-val">500+</div>
          <div class="stat-label">Clients</div>
        </div>
        <div class="login-stat">
          <div class="stat-val">1000+</div>
          <div class="stat-label">Transactions</div>
        </div>
      </div>
    </div>

    <div class="login-form-side">
      <div class="login-form-box">
        <h2>Welcome Back</h2>
        <p>Login to NOVA BANK</p>

        <div class="form-group">
          <label class="form-label">Email</label>
          <div class="form-control-icon">
            <i class="fa fa-envelope"></i>
            <input class="form-control" type="email" id="email" placeholder="email@mail.com">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="form-control-icon">
            <i class="fa fa-lock"></i>
            <input class="form-control" type="password" id="password" placeholder="Password">
          </div>
        </div>

        <div id="loginError" style="display:none;color:var(--red);font-size:13px;margin-bottom:14px;"></div>

        <button class="btn btn-primary btn-block" id="loginBtn">Login</button>

        <p style="margin-top:18px;text-align:center;color:var(--gray-500);font-size:14px;">
          New customer? <a href="register.html" style="color:var(--navy-800);font-weight:600;">Create an account</a>
        </p>
      </div>
    </div>

  </div>

  <!-- overlay removal (no module needed) -->
  <script>
    const overlay = document.getElementById('introOverlay');
    setTimeout(() => overlay && overlay.remove(), 3800);
  </script>

  <!-- login against Firebase -->
  <script type="module">
    import { login, homeFor } from "./auth.js";

    const btn = document.getElementById('loginBtn');
    const errBox = document.getElementById('loginError');
    const emailEl = document.getElementById('email');
    const passEl = document.getElementById('password');

    function friendly(code) {
      if (code.includes('invalid-credential') || code.includes('wrong-password') ||
          code.includes('user-not-found')) return 'Wrong email or password.';
      if (code.includes('invalid-email')) return 'Email format is not valid.';
      if (code.includes('too-many-requests')) return 'Too many attempts. Try again later.';
      if (code.includes('network')) return 'Network error. Check your connection.';
      return 'Login failed. Please try again.';
    }

    async function doLogin() {
      const email = emailEl.value.trim();
      const password = passEl.value;
      errBox.style.display = 'none';
      if (!email || !password) {
        errBox.textContent = 'Please enter your email and password.';
        errBox.style.display = 'block';
        return;
      }
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      try {
        const profile = await login(email, password);
        window.location.href = homeFor(profile.role);
      } catch (e) {
        errBox.textContent = e.message && e.message.includes('profile')
          ? e.message : friendly(e.code || e.message || '');
        errBox.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Login';
      }
    }

    btn.addEventListener('click', doLogin);
    passEl.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  </script>

</body>

</html>
